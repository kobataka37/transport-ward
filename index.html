<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>病棟モバイル 呼び出し端末</title>
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)" crossorigin></script>
  <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)" crossorigin></script>
  <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
  <script src="[https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js](https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js)"></script>
  <script src="[https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js](https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js)"></script>
  <script src="[https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js](https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js)"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen">
  <div id="root" class="w-full max-w-[390px]"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAGmEL7f0f-tluguX87xOOrPPetH3F4uSs",
      authDomain: "callsystemdatabase.firebaseapp.com",
      projectId: "callsystemdatabase",
      storageBucket: "callsystemdatabase.firebasestorage.app",
      messagingSenderId: "214007172640",
      appId: "1:214007172640:web:392c87463f7eeb08c87645"
    };

    const appId = 'callsystemdatabase-app';

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function App() {
      const [patients, setPatients] = useState([]);
      const [selectedWard, setSelectedWard] = useState('A病棟');
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [connError, setConnError] = useState(null);
      const [customInputs, setCustomInputs] = useState({});

      const [showDelayModal, setShowDelayModal] = useState(false);
      const [activePatient, setActivePatient] = useState(null);
      const [showUnavailableModal, setShowUnavailableModal] = useState(false);

      useEffect(() => {
        auth.signInAnonymously()
          .then((cred) => {
            setUser(cred.user);
            setLoading(false);
          })
          .catch((err) => {
            setConnError("匿名認証に失敗しました。");
            setLoading(false);
          });
      }, []);

      useEffect(() => {
        if (!user) return;
        const patientsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients');
        const unsubscribe = patientsRef.onSnapshot(
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id.toString(), ...doc.data() });
            });
            setPatients(list);
          },
          (error) => {
            setConnError("データベース接続エラーが発生しました。");
          }
        );
        return () => unsubscribe();
      }, [user]);

      const formatTime = (date) => {
        return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
      };

      const addMinutesToTimeStr = (timeStr, mins) => {
        if (!timeStr) return "";
        const [h, m] = timeStr.split(':').map(Number);
        const date = new Date();
        date.setHours(h);
        date.setMinutes(m + mins);
        return formatTime(date);
      };

      const calculateTransferTime = (p) => {
        if (p.delayType === 'time' && p.delayedTime) {
          return p.delayedTime;
        }
        if (!p.repliedAt || p.delayedMinutes === null) {
          if (p.callType === 'scheduled' && p.scheduledTime) {
            return p.scheduledTime;
          }
          return null;
        }
        const [hours, minutes] = p.repliedAt.split(':').map(Number);
        const date = new Date();
        date.setHours(hours);
        date.setMinutes(minutes + p.delayedMinutes);
        return formatTime(date);
      };

      const updateStatus = async (id, newStatus, payload = {}) => {
        if (!user) return;
        const nowStr = formatTime(new Date());
        const targetIdStr = id.toString();
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients').doc(targetIdStr);
        
        const patient = patients.find(p => p.id.toString() === targetIdStr);
        if (!patient) return;

        const isReply = ['ready', 'delayed', 'unavailable'].includes(newStatus);
        let newRepliedAt = patient.repliedAt;
        if (isReply) newRepliedAt = nowStr;
        if (newStatus === 'waiting') newRepliedAt = null;

        const updateData = {
          status: newStatus,
          delayedMinutes: payload.minutes !== undefined ? payload.minutes : (newStatus === 'waiting' ? null : (payload.time ? null : patient.delayedMinutes)),
          delayedTime: payload.time !== undefined ? payload.time : (newStatus === 'waiting' ? null : patient.delayedTime),
          delayType: payload.delayType !== undefined ? payload.delayType : (newStatus === 'waiting' ? null : patient.delayType),
          repliedAt: newRepliedAt,
          callType: newStatus === 'waiting' ? null : patient.callType,
          scheduledTime: newStatus === 'waiting' ? null : patient.scheduledTime,
          updatedAt: new Date().toISOString()
        };

        try {
          await docRef.set(updateData, { merge: true });
        } catch (err) {
          console.error(err);
          setConnError("通信に失敗しました。");
        }

        setShowDelayModal(false);
        setShowUnavailableModal(false);
        setActivePatient(null);
      };

      const handleInputChange = (id, field, value) => {
        setCustomInputs(prev => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
      };

      const handleCustomTimeSubmit = (id) => {
        const timeVal = customInputs[id.toString()]?.time;
        if (timeVal) {
          updateStatus(id, 'delayed', { time: timeVal, delayType: 'time' });
        }
      };

      const handleDelayClick = (patient) => {
        setActivePatient(patient);
        setShowDelayModal(true);
      };

      const handleUnavailableClick = (patient) => {
        setActivePatient(patient);
        setShowUnavailableModal(true);
      };

      const requestReadjustment = async (patient, reason) => {
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients').doc(patient.id.toString());
        await docRef.set({
          status: 'waiting',
          note: reason,
          repliedAt: null,
          callType: null,
          scheduledTime: null,
          updatedAt: new Date().toISOString()
        }, { merge: true });

        setShowUnavailableModal(false);
        setActivePatient(null);
      };

      if (loading) {
        return <div className="p-8 text-center text-slate-500 font-bold">アプリを起動しています...</div>;
      }

      return (
        <div className="min-h-screen bg-slate-900 p-2 flex flex-col justify-center items-center font-sans">
          {connError && <div className="w-full max-w-[390px] mb-2 px-3 py-2 bg-red-600 text-white text-xs font-bold rounded-lg shadow-md animate-pulse">{connError}</div>}
          
          <div className="w-full max-w-[390px] h-[92vh] bg-gray-100 overflow-hidden flex flex-col rounded-[2rem] shadow-2xl border-4 border-gray-700 relative">
            {/* ヘッダー */}
            <div className="bg-indigo-600 text-white pt-8 pb-3 px-4 shadow-md flex justify-between items-center shrink-0">
              <h2 className="text-base font-bold flex items-center">📱 病棟 検査連携</h2>
              <select 
                className="text-xs bg-indigo-700 text-white border-none rounded py-1 px-2 font-bold focus:ring-0 cursor-pointer outline-none" 
                value={selectedWard} 
                onChange={(e) => setSelectedWard(e.target.value)}
              >
                <option value="A病棟">A病棟</option>
                <option value="B病棟">B病棟</option>
                <option value="C病棟">C病棟</option>
              </select>
            </div>

            {/* スクロール患者リスト */}
            <div className="p-3 overflow-y-auto flex-1 space-y-3">
              {patients
                .filter(p => p.ward === selectedWard && p.status !== 'completed')
                .sort((a, b) => {
                  if (a.status === 'transfer_requested' && b.status !== 'transfer_requested') return -1;
                  if (a.status !== 'transfer_requested' && b.status === 'transfer_requested') return 1;
                  if (a.status === 'called' && b.status !== 'called') return -1;
                  if (a.status !== 'called' && b.status === 'called') return 1;
                  return (a.time || '').localeCompare(b.time || '');
                })
                .map((patient) => {
                  const isCalled = patient.status === 'called';
                  const isTransferRequested = patient.status === 'transfer_requested';

                  let cardStyle = "bg-white border border-slate-200 shadow-sm";
                  if (patient.status === 'ready' || patient.status === 'delayed') cardStyle = "bg-white border-2 border-green-500 shadow-md";
                  if (isCalled) cardStyle = "bg-white border-2 border-red-500 shadow-lg ring-4 ring-red-100";
                  if (isTransferRequested) cardStyle = "bg-purple-50 border-2 border-purple-600 shadow-xl ring-4 ring-purple-200"; 

                  const isScheduledCall = patient.callType === 'scheduled' && patient.scheduledTime;

                  return (
                    <div key={patient.id.toString()} className={`p-4 rounded-xl transition-all ${cardStyle}`}>
                      <div className="flex justify-between items-start mb-1">
                        <div>
                          <div className="text-[10px] text-gray-500 font-medium">{patient.time}予定 • {patient.examType}</div>
                          <div className="text-base font-bold text-gray-900 leading-tight">{patient.name} 様</div>
                        </div>
                        {!isCalled && !isTransferRequested && (
                          <div className="flex flex-col items-end">
                            <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-gray-100 text-gray-600">
                              {patient.status === 'waiting' && "待機中"}
                              {patient.status === 'ready' && "すぐ搬送可"}
                              {patient.status === 'delayed' && "時間指定可"}
                              {patient.status === 'unavailable' && "現在不可"}
                            </span>
                            {patient.repliedAt && <span className="text-[9px] text-gray-500 mt-0.5">{patient.repliedAt} 応答</span>}
                          </div>
                        )}
                      </div>

                      {/* 再調整理由の赤枠メッセージ */}
                      {!isCalled && patient.note && (
                        <div className="mt-2 mb-1 px-2.5 py-2 bg-red-100 border border-red-400 rounded-lg text-xs font-bold text-red-900 flex items-center gap-1.5 shadow-sm animate-pulse">
                          <span>⚠️ 【再調整】{patient.note}</span>
                        </div>
                      )}

                      {/* 最終搬送指示 (Goサイン) */}
                      {isTransferRequested && (
                         <div className="mt-3 pt-3 border-t border-purple-200 bg-purple-100 -mx-4 -mb-4 p-3 rounded-b-xl">
                            <p className="text-xs text-purple-800 font-bold flex items-center justify-center animate-bounce">
                              🚨 放射線科から最終搬送指示！
                            </p>
                            <p className="text-sm text-purple-700 text-center mt-1 font-black">
                              {calculateTransferTime(patient) ? `${calculateTransferTime(patient)} ごろ搬送してください` : "今すぐ、搬送を開始してください"}
                            </p>
                         </div>
                      )}

                      {/* 検査室からの打診受信時 */}
                      {isCalled && (
                        <div className="mt-3 pt-3 border-t border-red-100">
                          <p className="text-xs text-red-800 font-bold mb-2 bg-red-50 p-2 rounded leading-tight border border-red-100">
                            {isScheduledCall ? (
                              <>【時間打診】{patient.examType} に <span className="text-sm text-purple-800 underline font-black">[{patient.scheduledTime}]</span> 搬送可能ですか？</>
                            ) : (
                              `【すぐ搬送依頼】${patient.examType} にすぐ搬送可能ですか？`
                            )}
                          </p>
                          
                          <div className="space-y-1.5">
                            {isScheduledCall ? (
                              <>
                                <button 
                                  onClick={() => updateStatus(patient.id, 'ready')} 
                                  className="w-full py-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-lg shadow-sm transition-colors"
                                >
                                  {patient.scheduledTime} で合意する
                                </button>
                                <div className="grid grid-cols-3 gap-1">
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { time: addMinutesToTimeStr(patient.scheduledTime, 10), delayType: 'time' })} 
                                    className="py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    10分遅延
                                  </button>
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { time: addMinutesToTimeStr(patient.scheduledTime, 20), delayType: 'time' })} 
                                    className="py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    20分遅延
                                  </button>
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { time: addMinutesToTimeStr(patient.scheduledTime, 30), delayType: 'time' })} 
                                    className="py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    30分遅延
                                  </button>
                                </div>
                              </>
                            ) : (
                              <>
                                <button 
                                  onClick={() => updateStatus(patient.id, 'ready')} 
                                  className="w-full py-2 bg-green-600 hover:bg-green-700 text-white text-xs font-bold rounded-lg shadow-sm transition-colors"
                                >
                                  すぐ対応可能 (準備OK)
                                </button>
                                <div className="grid grid-cols-3 gap-1">
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { minutes: 10, delayType: 'minutes' })} 
                                    className="py-1 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    10分後
                                  </button>
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { minutes: 20, delayType: 'minutes' })} 
                                    className="py-1 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    20分後
                                  </button>
                                  <button 
                                    onClick={() => updateStatus(patient.id, 'delayed', { minutes: 30, delayType: 'minutes' })} 
                                    className="py-1 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded text-[10px]"
                                  >
                                    30分後
                                  </button>
                                </div>
                              </>
                            )}

                            {/* 手動の「時刻逆提案」入力 */}
                            <div className="flex items-center justify-between gap-1 bg-red-50 p-1.5 rounded-lg border border-red-200 shadow-inner">
                              <div className="flex items-center gap-1 text-xs font-bold text-red-950">
                                <span>指定:</span>
                                <input 
                                  type="time" 
                                  className="w-[75px] px-1 py-0.5 text-xs font-mono text-center font-bold bg-white rounded border border-red-300 focus:outline-none focus:border-red-500" 
                                  value={customInputs[patient.id.toString()]?.time || ''} 
                                  onChange={(e) => handleInputChange(patient.id, 'time', e.target.value)} 
                                />
                              </div>
                              <span className="text-[11px] font-bold text-red-950 whitespace-nowrap">に搬送可</span>
                              <button 
                                onClick={() => handleCustomTimeSubmit(patient.id)} 
                                className="px-2 py-1 bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold rounded shadow transition-colors"
                              >
                                送信
                              </button>
                            </div>
                            
                            <button 
                              onClick={() => updateStatus(patient.id, 'unavailable')} 
                              className="w-full py-1.5 bg-gray-600 hover:bg-gray-700 text-white text-xs font-bold rounded-lg transition-colors"
                            >
                              現在不可 (処置中など)
                            </button>
                          </div>
                        </div>
                      )}
                      
                      {/* 返答後の待機ガイダンス */}
                      {['ready', 'delayed'].includes(patient.status) && (
                        <div className="mt-2 pt-1.5 border-t border-gray-100 text-[9px] text-gray-500 text-center bg-gray-50 rounded">
                          返答済。放射線科からの「最終確定指示」を待っています。
                        </div>
                      )}
                      {patient.status === 'unavailable' && (
                        <div className="mt-2 pt-1.5 border-t border-gray-100 text-[9px] text-gray-500 text-center bg-gray-50 rounded">
                          現在不可と返答しました。再調整を待っています。
                        </div>
                      )}
                    </div>
                  );
                })}
              
              {patients.filter(p => p.ward === selectedWard && p.status !== 'completed').length === 0 && (
                <div className="text-center py-8 text-sm text-gray-500 bg-white rounded-xl shadow-sm">
                  現在、対象患者はいません。
                </div>
              )}
            </div>
          </div>

          {/* 遅れ時間選択モーダル */}
          {showDelayModal && activePatient && (
            <div className="absolute inset-0 bg-black/50 flex items-end justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm space-y-4">
                <div className="text-center">
                  <h3 className="font-bold text-base text-slate-900">何分遅れますか？</h3>
                  <p className="text-xs text-slate-400 mt-0.5">{activePatient.name} 様</p>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => updateStatus(activePatient.id, 'delayed', { minutes: 5, delayType: 'minutes' })} className="p-3 bg-amber-50 hover:bg-amber-100 text-amber-900 font-bold rounded-xl text-sm border border-amber-200">5分遅れる</button>
                  <button onClick={() => updateStatus(activePatient.id, 'delayed', { minutes: 10, delayType: 'minutes' })} className="p-3 bg-amber-50 hover:bg-amber-100 text-amber-900 font-bold rounded-xl text-sm border border-amber-200">10分遅れる</button>
                  <button onClick={() => updateStatus(activePatient.id, 'delayed', { minutes: 15, delayType: 'minutes' })} className="p-3 bg-amber-50 hover:bg-amber-100 text-amber-900 font-bold rounded-xl text-sm border border-amber-200">15分遅れる</button>
                  <button onClick={() => updateStatus(activePatient.id, 'delayed', { minutes: 30, delayType: 'minutes' })} className="p-3 bg-amber-50 hover:bg-amber-100 text-amber-900 font-bold rounded-xl text-sm border border-amber-200">30分遅れる</button>
                </div>
                <button onClick={() => setShowDelayModal(false)} className="w-full p-3 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-bold text-slate-600">
                  キャンセル
                </button>
              </div>
            </div>
          )}

          {/* 時間変更・対応不可モーダル */}
          {showUnavailableModal && activePatient && (
            <div className="absolute inset-0 bg-black/50 flex items-end justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm space-y-4">
                <div className="text-center">
                  <h3 className="font-bold text-base text-slate-900">時間再調整のお願い</h3>
                  <p className="text-xs text-slate-400 mt-0.5">放射線科の画面に再調整の理由を送信します</p>
                </div>
                <div className="space-y-2">
                  <button onClick={() => requestReadjustment(activePatient, 'ケア対応中')} className="w-full p-3 bg-red-50 hover:bg-red-100 text-red-900 font-bold rounded-xl text-left text-sm border border-red-200 flex justify-between">
                    <span>🏥 ケア対応中のため（オムツ・処置等）</span>
                    <span>➜</span>
                  </button>
                  <button onClick={() => requestReadjustment(activePatient, '点滴・処置中')} className="w-full p-3 bg-red-50 hover:bg-red-100 text-red-900 font-bold rounded-xl text-left text-sm border border-red-200 flex justify-between">
                    <span>💉 点滴・医療処置対応中のため</span>
                    <span>➜</span>
                  </button>
                  <button onClick={() => requestReadjustment(activePatient, '食事・リハビリ中')} className="w-full p-3 bg-red-50 hover:bg-red-100 text-red-900 font-bold rounded-xl text-left text-sm border border-red-200 flex justify-between">
                    <span>🍽️ 食事・リハビリ対応中のため</span>
                    <span>➜</span>
                  </button>
                </div>
                <button onClick={() => setShowUnavailableModal(false)} className="w-full p-3 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-bold text-slate-600">
                  キャンセル
                </button>
              </div>
            </div>
          )}

        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>

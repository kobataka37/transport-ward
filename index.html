<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>病棟検査連携 - スマホ端末</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { -webkit-tap-highlight-color: transparent; }</style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex justify-center">

    <div class="w-full max-w-md bg-gray-50 flex flex-col min-h-screen shadow-2xl border-x border-gray-200">
        <header class="bg-indigo-600 text-white pt-6 pb-3 px-4 shadow-md flex items-center justify-between sticky top-0 z-40">
            <h2 class="text-base font-bold flex items-center"><i class="fa-solid fa-mobile-screen-button mr-2"></i>病棟 検査確認ポータル</h2>
            <select id="ward-selector" class="text-xs bg-indigo-700 text-white border-none rounded py-1 px-2 font-bold outline-none cursor-pointer">
                <option value="A病棟">A病棟</option>
                <option value="B病棟">B病棟</option>
                <option value="C病棟">C病棟</option>
            </select>
        </header>

        <main id="card-container" class="p-3 flex-1 space-y-4 overflow-y-auto">
            <div class="text-center py-8 text-gray-400 text-sm">データを読み込み中...</div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGmEL7f0f-tluguX87xOOrPPetH3F4uSs",
            authDomain: "callsystemdatabase.firebaseapp.com",
            projectId: "callsystemdatabase",
            storageBucket: "callsystemdatabase.firebasestorage.app",
            messagingSenderId: "214007172640",
            appId: "1:214007172640:web:392c87463f7eeb08c87645"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'callsystemdatabase-app';

        let patientsData = [];
        let currentWard = "A病棟";

        signInAnonymously(auth);

        const patientsRef = collection(db, 'artifacts', appId, 'public', 'data', 'patients');
        onSnapshot(patientsRef, (snapshot) => {
            patientsData = [];
            snapshot.forEach(doc => patientsData.push({ id: doc.id, ...doc.data() }));
            renderCards();
        });

        document.getElementById("ward-selector").addEventListener("change", (e) => {
            currentWard = e.target.value;
            renderCards();
        });

        function renderCards() {
            const container = document.getElementById("card-container");
            container.innerHTML = "";

            const filtered = patientsData.filter(p => p.ward === currentWard && p.status !== 'completed');
            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-sm text-gray-400 bg-white rounded-xl shadow-sm border">現在、対象の患者はいません。</div>`;
                return;
            }

            filtered.sort((a, b) => {
                if (a.status === 'transfer_requested' && b.status !== 'transfer_requested') return -1;
                if (a.status !== 'transfer_requested' && b.status === 'transfer_requested') return 1;
                if (a.status === 'called' && b.status !== 'called') return -1;
                if (a.status !== 'called' && b.status === 'called') return 1;
                return (a.time || '').localeCompare(b.time || '');
            }).forEach(p => {
                const card = document.createElement("div");
                
                let cardStyle = "bg-white border border-gray-200 shadow-sm";
                if(p.status === 'ready' || p.status === 'delayed') cardStyle = "bg-white border-2 border-green-500 shadow-md";
                if(p.status === 'unavailable') cardStyle = "bg-white border border-gray-300 opacity-60";
                if(p.status === 'called') cardStyle = "bg-white border-2 border-red-500 shadow-lg ring-4 ring-red-100 animate-fade-in";
                if(p.status === 'transfer_requested') cardStyle = "bg-purple-50 border-2 border-purple-600 shadow-xl ring-4 ring-purple-100";

                card.className = `p-4 rounded-xl transition-all ${cardStyle}`;

                let statusBadge = "";
                if(p.status === 'ready') statusBadge = `<span class="bg-green-100 text-green-700 text-[11px] font-bold px-2 py-0.5 rounded">すぐ搬送可(答)</span>`;
                if(p.status === 'delayed') {
                    const txt = p.delayType === 'time' ? `${p.delayedTime}可` : `${p.delayedMinutes}分後可`;
                    statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-[11px] font-bold px-2 py-0.5 rounded">${txt}</span>`;
                }
                if(p.status === 'unavailable') statusBadge = `<span class="bg-gray-600 text-white text-[11px] font-medium px-2 py-0.5 rounded">現在不可(答)</span>`;

                let innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div>
                            <div class="text-[11px] text-gray-500 font-medium font-mono">${p.time} 予定 • ${p.examType}</div>
                            <div class="text-base font-black text-gray-900 mt-0.5">${p.name} 様</div>
                        </div>
                        <div>${statusBadge}</div>
                    </div>
                `;

                if(p.status !== 'called' && p.note) {
                    innerHTML += `
                        <div class="mt-2 p-2 bg-red-50 border border-red-200 rounded-lg text-xs font-bold text-red-900 flex items-center gap-1.5">
                            <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
                            <span>【調整中】${p.note}</span>
                        </div>
                    `;
                }

                if(p.status === 'called') {
                    const isSched = p.callType === 'scheduled';
                    const displayTime = p.scheduledTime || '時間指定';

                    innerHTML += `
                        <div class="mt-3 pt-3 border-t border-red-100">
                            <div class="bg-red-50 p-2 rounded-lg text-xs font-bold text-red-900 mb-3">
                                <span class="text-red-500 block text-[10px]"><i class="fa-solid fa-circle-exclamation animate-bounce"></i> 放射線科より打診</span>
                                <span class="text-sm font-black leading-tight">
                                    ${isSched ? `検査室に <span class="text-purple-700 underline font-black">[ ${displayTime} ]</span> ごろ搬送可能ですか？` : '今からすぐ検査室に搬送可能ですか？'}
                                </span>
                            </div>
                            <div class="space-y-2">
                                <button onclick="replyStatus('${p.id}', 'ready')" class="w-full py-2.5 bg-green-600 text-white text-sm font-bold rounded-lg shadow"><i class="fa-regular fa-circle-check mr-1"></i> ${isSched ? displayTime+' に搬送可能' : 'すぐ搬送可能 (準備OK)'}</button>
                                
                                <div class="grid grid-cols-3 gap-1.5 text-xs font-bold">
                                    <button onclick="replyDelayMins('${p.id}', 10, '${p.scheduledTime || ''}')" class="py-2 bg-yellow-500 text-white rounded-lg shadow">${isSched ? '10分遅らせる':'10分後'}</button>
                                    <button onclick="replyDelayMins('${p.id}', 20, '${p.scheduledTime || ''}')" class="py-2 bg-yellow-500 text-white rounded-lg shadow">${isSched ? '20分遅らせる':'20分後'}</button>
                                    <button onclick="replyDelayMins('${p.id}', 30, '${p.scheduledTime || ''}')" class="py-2 bg-yellow-500 text-white rounded-lg shadow">${isSched ? '30分遅らせる':'30分後'}</button>
                                </div>

                                <div class="flex items-center justify-between gap-1 bg-red-50 p-1.5 rounded-lg border border-red-200">
                                    <span class="text-xs font-bold text-red-950">時間指定して逆提案:</span>
                                    <input type="time" id="custom-reply-time-${p.id}" class="w-[75px] p-0.5 text-xs border border-red-300 font-mono text-center font-bold bg-white rounded">
                                    <button onclick="replyCustomTime('${p.id}')" class="px-2 py-1 bg-yellow-600 text-white text-xs font-bold rounded shadow">送信</button>
                                </div>

                                <button onclick="replyStatus('${p.id}', 'unavailable')" class="w-full py-2 bg-gray-600 text-white text-xs font-bold rounded-lg">現在不可 (点滴・処置中など)</button>
                            </div>
                        </div>
                    `;
                }

                if(p.status === 'transfer_requested') {
                    let textTime = "今すぐ、検査室へ搬送してください";
                    if(p.delayType === 'time' && p.delayedTime) textTime = `【 ${p.delayedTime} 】に検査室へ到着するよう搬送してください`;
                    else if(p.repliedAt && p.delayedMinutes) {
                        const [h, m] = p.repliedAt.split(':').map(Number);
                        const d = new Date(); d.setHours(h); d.setMinutes(m + p.delayedMinutes);
                        textTime = `【 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} 】に検査室へ到着するよう搬送してください`;
                    } else if(p.callType === 'scheduled' && p.scheduledTime) {
                        textTime = `【 ${p.scheduledTime} 】に検査室へ到着するよう搬送してください`;
                    }

                    innerHTML += `
                        <div class="mt-3 pt-3 border-t border-purple-200 bg-purple-600 -mx-4 -mb-4 p-3 rounded-b-xl text-white text-center">
                          <p class="text-sm font-black flex items-center justify-center gap-1">
                                <i class="fa-solid fa-wheelchair-move animate-bounce"></i> 最終確定：搬送開始してください
                            </p>
                            <p class="text-xs mt-1 font-bold opacity-90 bg-purple-700 p-1.5 rounded-lg">${textTime}</p>
                        </div>
                    `;
                }

                if(['ready', 'delayed', 'unavailable'].includes(p.status)) {
                    innerHTML += `<div class="mt-2 pt-1.5 text-[10px] text-gray-400 text-center border-t border-gray-100 bg-gray-50 rounded">放射線科の「最終確定（GOサイン）」を待っています...</div>`;
                }

                card.innerHTML = innerHTML;
                container.appendChild(card);
            });
        }

        window.replyStatus = async function(id, status) {
            const d = new Date();
            const nowStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'patients', id);
            await setDoc(docRef, { status: status, repliedAt: nowStr, updatedAt: new Date().toISOString() }, { merge: true });
        };

        window.replyDelayMins = async function(id, mins, baseTimeStr) {
            const d = new Date();
            const nowStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'patients', id);
            
            if(baseTimeStr && baseTimeStr !== "null" && baseTimeStr !== "") {
                const [h, m] = baseTimeStr.split(':').map(Number);
                d.setHours(h); d.setMinutes(m + mins);
                const destTimeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                await setDoc(docRef, { status: 'delayed', delayType: 'time', delayedTime: destTimeStr, repliedAt: nowStr, updatedAt: new Date().toISOString() }, { merge: true });
            } else {
                await setDoc(docRef, { status: 'delayed', delayType: 'minutes', delayedMinutes: mins, repliedAt: nowStr, updatedAt: new Date().toISOString() }, { merge: true });
            }
        };

        window.replyCustomTime = async function(id) {
            const timeVal = document.getElementById(`custom-reply-time-${id}`).value;
            if(!timeVal) return;
            const d = new Date();
            const nowStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'patients', id);
            await setDoc(docRef, { status: 'delayed', delayType: 'time', delayedTime: timeVal, repliedAt: nowStr, updatedAt: new Date().toISOString() }, { merge: true });
        };
    </script>
</body>
</html>
